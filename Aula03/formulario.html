<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formuláros HTML</title>
</head>
<body>
    <form action="/processardados" method="post"
    autocomplete="on"> 
        


        
<label for="nome">"Nome: "</label>        
        <input type="text" name="nome" id="nome">


        <label for="nome">Email</label>
        <input required type="email" name="email" id="" placeholder="Ex:julia@gmail.com">

        <label for="nome">Telefone</label>
        <input type="tel" name="tel" id="" placeholder="(xx)xxxxx-xxxx">

        <label for="senha">Senha:</label>
        <input type="password" name="password" id="">

        <label for="idade">Idade:</label>
        <input maxlength="3" type="number" name="idade" id="idade">

        <input type="time" name="horario">

        <label for="color">Cor</label>
        <input type="color" name="color" id="color">

        <label for="range">Range:</label>
        <input type="range" min="0" max="100" value="25" name="range" id="range">

        <h1>25</h1>

        <input type="file" accept="image/*" name="file" id="file">
        
        <input type="submit" value="Enviar">
</form>


</body>
</html>
