<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>

    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

h1{
    background-color: rgb(162, 116, 236);
    display: inline-block;
   margin-top: 20px;
    margin-left: 50px;
    border: 5px solid rgb(130, 185, 247);


}
.container{
    padding: 20px 45px;
    background-color: #ddd;
    width: 50%;

}

.circulo{
    display: flex;
    text-align: center;
    align-items: center;
    justify-content: center;
    background-color: rgb(236, 101, 214);
    display: flex;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    
}

h3{
    background-color: rgb(240, 219, 101);
    display: inline-block;
}

.container-flex {
    display: flex;
    gap: 10px;
    flex-direction: column;
    justify-content: space-around;
    background-color: rgb(49, 109, 238);
    width: 600px;
    padding: 80px 20px;
}

.box {
    background-color: #fff;
    

}

    </style>
</head>
<body>

    <h1> Aula BoxMoel</h1>
    
    <div class="container">
        <h2>Trabalhando com Divs</h2>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Sit perferendis sint quia quas repudiandae aspernatur numquam, odio impedit. Placeat tempore aut perferendis 
            ipsa sed, provident obcaecati neque in necessitatibus aliquid?</p>

    </div>

    <div class="circulo">

<h3>DA</h3>

    </div>

    <div class="container-flex">
        <div class="Box">Box 1 </div>
        <div class="Box">Box 2</div>
        <div class="Box">Box 3</div>

    </div>

</body>
</html>
